    return (

        <defs><linearGradient id={`pg-${size}`} x1="0%" y1="0%" x2="100%" y2="0%">

    );

    const toggleTask = id => setTasks(prev=>prev.map(t=>t.id===id?{...t,done:!t.done}:t));
    const addTask    = ({text,due}) => setTasks(prev=>[...prev,{id:Date.now(),text,due,done:false}]);
    const unread     = CHAT_CONTACTS.reduce((s,c)=>s+c.unread,0);
    const isChat     = active==='chat';

    return (
      <div className="min-h-screen flex flex-col">
        <Header activeTab={active} profile={profile}/>
        <main className={`flex-1 overflow-auto ${isChat?'p-4 pb-20':'p-4 pb-24'}`}>
          <div className="max-w-screen-xl mx-auto">
            {active==='dashboard' && <DashboardScreen profile={profile} tasks={tasks} goals={goals} toggleTask={toggleTask} addTask={addTask} setActive={setActive}/>}
            {active==='goals'     && <GoalsScreen     goals={goals} setGoals={setGoals} progressNote={progressNote} setProgressNote={setProgressNote} setActive={setActive}/>}
            {active==='chat'      && <ChatScreen/>}
            {active==='beauty'    && <BeautyScreen/>}
            {active==='settings'  && <SettingsScreen  profile={profile} setProfile={setProfile}/>}
          </div>
        </main>
        <TabBar active={active} setActive={setActive} unreadCount={unread}/>
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
